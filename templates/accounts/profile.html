{% extends 'base.html' %}

{% block title %}Profile | Student Performance Dashboard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header fw-semibold">Profile</div>
            <div class="card-body">
                <dl class="row mb-0">
                    <dt class="col-sm-4">Username</dt>
                    <dd class="col-sm-8">{{ user.username }}</dd>
                    <dt class="col-sm-4">Email</dt>
                    <dd class="col-sm-8">{{ user.email|default:"Not provided" }}</dd>
                </dl>
            </div>
            <div class="card-footer bg-white text-end">
                <a class="btn btn-outline-danger" href="{% url 'accounts:logout' %}">Logout</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
